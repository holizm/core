name: accounts

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 6'
  push:
    branches:
      - main
    paths:
      - 'container/files/prod/accounts'

jobs:
  build-accounts:
    uses: ./.github/workflows/builder.yaml
    with:
      service: accounts
      dir: prod
    secrets: inherit
