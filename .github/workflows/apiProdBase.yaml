name: apiProdBase

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 6'
  push:
    branches:
      - main
    paths:
      - 'container/files/prod/apiProdBase'

jobs:
  build:
    uses: ./.github/workflows/builder.yaml
    with:
      dir: prod
      file: apiProdBase
      tag: api-prod-base
    secrets: inherit
